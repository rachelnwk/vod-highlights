[analysis_api]
base_url = https://your-api-id.execute-api.us-east-2.amazonaws.com/prod
path = /analyze
timeout_seconds = 30

[local_helper]
host = 127.0.0.1
port = 4001
public_base_url = http://localhost:4001
max_upload_mb = 300
max_concurrent_jobs = 1
temp_dir = ./temp
keep_job_artifacts = true
cors_allowed_origin = *

[pipeline]
frame_sample_fps = 2.0
crop_x = 1470
crop_y = 0
crop_w = 450
crop_h = 225
dedupe_window_seconds = 2.0
merge_window_seconds = 8.0
clip_pre_seconds = 15.0
clip_post_seconds = 0.0
fuzzy_match_threshold = 78
